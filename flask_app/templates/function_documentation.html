<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickDoc - Function Documentation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #f9fafb;
            color: #111827;
            line-height: 1.5;
        }

        .container {
            min-height: 100vh;
        }

        .header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .header-content {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 2.5rem;
            height: 2.5rem;
            background: #2563eb;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #111827;
        }

        .main-layout {
            display: flex;
        }

        .sidebar {
            width: 16rem;
            background: white;
            min-height: calc(100vh - 73px);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .sidebar-content {
            padding: 1rem;
        }

        .section {
            margin-bottom: 1.5rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        .section-title {
            font-weight: 500;
            color: #111827;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-radius: 0.375rem;
            transition: background-color 0.2s;
        }

        .file-item:hover {
            background-color: #f9fafb;
        }

        .file-name {
            font-size: 0.875rem;
            color: #374151;
        }

        .content {
            flex: 1;
            padding: 2rem;
        }

        .content-wrapper {
            max-width: 64rem;
        }

        .page-title {
            font-size: 1.875rem;
            font-weight: 600;
            color: #111827;
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: #6b7280;
            margin-bottom: 1.5rem;
        }

        .doc-card {
            background: white;
            border-radius: 0.5rem;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .doc-header {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            padding: 1rem 1.5rem;
        }

        .doc-header-title {
            color: white;
            font-weight: 600;
            font-size: 1.125rem;
        }

        .doc-content {
            padding: 1.5rem;
        }

        .doc-content pre {
            background: #f8f9fa;
            padding: 15px;
            border: 1px solid #ddd;
            white-space: pre-wrap;
            font-size: 0.875rem;
            color: #374151;
            border-radius: 0.375rem;
        }

        .actions {
            padding: 0 1.5rem 1.5rem;
        }

        .button-group {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #2563eb;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .icon-sm {
            width: 1rem;
            height: 1rem;
        }

        .text-orange {
            color: #ea580c;
        }

        .text-purple {
            color: #9333ea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <i data-lucide="file-text" class="icon-sm"></i>
                    </div>
                    <h1 class="logo-text">ClickDoc</h1>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                <div class="sidebar-content">
                    <div class="section">
                        <div class="section-header">
                            <i data-lucide="upload" class="icon-sm text-orange"></i>
                            <h3 class="section-title">File Uploaded</h3>
                        </div>
                        <div class="file-list">
                            {% if filename %}
                                <div class="file-item">
                                    <i data-lucide="file-text" class="icon-sm text-purple"></i>
                                    <span class="file-name">{{ filename }}</span>
                                </div>
                            {% else %}
                                <div class="file-item">
                                    <i data-lucide="file-text" class="icon-sm text-purple"></i>
                                    <span class="file-name">No files uploaded</span>
                                </div>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </aside>

            <main class="content">
                <div class="content-wrapper">
                    <h2 class="page-title">Function Documentation</h2>
                    <p class="page-subtitle">Generated for: {{ filename }}</p>

                    <div class="doc-card">
                        <div class="doc-header">
                            <h3 class="doc-header-title">Generated Documentation</h3>
                        </div>
                        <div class="doc-content">
                            <pre>{{ result }}</pre>
                        </div>
                        <div class="actions">
                            <div class="button-group">
                                <button class="btn" onclick="regenerate()">
                                    <i data-lucide="refresh-cw" class="icon-sm"></i>
                                    <span>Regenerate</span>
                                </button>
                                <button class="btn" onclick="edit()">
                                    <i data-lucide="edit" class="icon-sm"></i>
                                    <span>Edit</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function regenerate() {
            window.location.href = "{{ url_for('generate.function_documentation') }}";
        }

        function edit() {
            console.log('Edit clicked - functionality to be implemented');
        }
    </script>
</body>
</html>
