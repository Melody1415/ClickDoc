<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Click Doc - Upload</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 0 auto; padding: 20px; background: #f4f4f4; }
        form { margin-bottom: 20px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input[type="file"] { margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>Click Doc: AI Code Analyzer</h1>
    <p>Upload a code file to proceed to the dashboard.</p>
    
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".py,.txt,.js,.md" required>
        <br><br>
        <button type="submit">Upload</button>
    </form>
</body>
</html>
