<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload - ClickDoc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="min-h-screen bg-white">
    <!-- Header -->
    <header class="flex justify-between items-center px-8 py-6 bg-white shadow-sm">
        <div class="flex items-center gap-3">
            <img 
                src="./assets/logo.png" 
                alt="ClickDoc Logo" 
                class="w-8 h-8"
                onerror="this.style.display='none'"
            />
            <div class="text-2xl font-bold text-blue-600">
                ClickDoc
            </div>
        </div>
        <button id="home-btn" class="text-blue-600 hover:text-blue-800 transition-colors flex items-center gap-2">
            <i data-lucide="home" class="w-5 h-5"></i>
            Home
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex items-center justify-center min-h-screen px-8 py-12">
        <div class="max-w-md w-full text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-12">Upload Your Code</h1>
            
            <!-- Drag & Drop Area -->
            <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-lg p-16 mb-8 hover:border-blue-400 hover:bg-blue-50 transition-all duration-300 cursor-pointer">
                <div id="drop-content">
                    <i data-lucide="upload" class="w-12 h-12 text-gray-400 mx-auto mb-4"></i>
                    <p class="text-gray-600 text-lg mb-2">Drag & Drop Files Here</p>
                    <p class="text-gray-500 mb-6">Or click to browse files</p>
                </div>
                <input type="file" id="file-input" multiple accept=".js,.jsx,.ts,.tsx,.py,.html,.css,.json,.md,.pdf" class="hidden">
            </div>

            <!-- Language Tags -->
            <div class="flex justify-center gap-3 mb-8">
                <span class="bg-orange-100 text-orange-800 px-3 py-1 rounded-full text-sm">Java</span>
                <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-sm">Python</span>
                <span class="bg-yellow-100 text-yellow-800 px-3 py-1 rounded-full text-sm">JavaScript</span>
            </div>

            <!-- File List -->
            <div id="file-list" class="mb-8 hidden">
                <div id="files-container" class="space-y-2">
                    <!-- Files will be added here dynamically -->
                </div>
            </div>

            <!-- Process Button -->
            <button id="process-btn" class="bg-blue-600 text-white px-8 py-3 rounded-lg text-lg hover:bg-blue-700 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                <span id="process-text">Process Files</span>
                <i data-lucide="loader-2" id="process-loader" class="w-5 h-5 animate-spin ml-2 hidden"></i>
            </button>
        </div>
    </main>

    <!-- Processing Modal -->
    <div id="processing-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg p-6 w-96 max-w-90vw">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Processing Files...</h3>
            <div class="space-y-3">
                <div id="process-progress" class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <div id="process-status" class="text-sm text-gray-600">Reading files...</div>
            </div>
        </div>
    </div>

    <script>
        let selectedFiles = [];

        // DOM Elements
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileList = document.getElementById('file-list');
        const filesContainer = document.getElementById('files-container');
        const processBtn = document.getElementById('process-btn');
        const processText = document.getElementById('process-text');
        const processLoader = document.getElementById('process-loader');
        const homeBtn = document.getElementById('home-btn');
        const processingModal = document.getElementById('processing-modal');
        const progressBar = document.getElementById('progress-bar');
        const processStatus = document.getElementById('process-status');

        // Home button functionality
        homeBtn.addEventListener('click', function() {
            window.location.href = 'home.html';
        });

        // Drop zone click
        dropZone.addEventListener('click', function() {
            fileInput.click();
        });

        // File input change
        fileInput.addEventListener('change', function(e) {
            handleFiles(e.target.files);
        });

        // Drag and drop functionality
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-blue-100');
        });

        dropZone.addEventListener('dragleave', function(e) {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-100');
        });

        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-100');
            handleFiles(e.dataTransfer.files);
        });

        // Handle selected files
        function handleFiles(files) {
            selectedFiles = Array.from(files);
            displayFiles();
            updateProcessButton();
        }

        // Display selected files
        function displayFiles() {
            if (selectedFiles.length === 0) {
                fileList.classList.add('hidden');
                return;
            }

            fileList.classList.remove('hidden');
            filesContainer.innerHTML = '';

            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'flex items-center justify-between bg-gray-100 p-3 rounded-lg';
                
                fileItem.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i data-lucide="${getFileIcon(file.name)}" class="w-4 h-4 ${getFileIconColor(file.name)}"></i>
                        <div>
                            <span class="text-sm font-medium text-gray-700">${file.name}</span>
                            <div class="text-xs text-gray-500">${formatFileSize(file.size)}</div>
                        </div>
                    </div>
                    <button onclick="removeFile(${index})" class="text-red-500 hover:text-red-700 transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                `;
                
                filesContainer.appendChild(fileItem);
            });

            // Re-initialize Lucide icons
            lucide.createIcons();
        }

        // Remove file
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            displayFiles();
            updateProcessButton();
        }

        // Update process button state
        function updateProcessButton() {
            processBtn.disabled = selectedFiles.length === 0;
        }

        // Read file content
        async function readFileContent(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    resolve(e.target.result);
                };
                
                reader.onerror = function() {
                    reject(new Error(`Failed to read file: ${file.name}`));
                };

                // Handle different file types
                if (file.type === 'application/pdf') {
                    reader.readAsArrayBuffer(file);
                } else {
                    reader.readAsText(file);
                }
            });
        }

        // Process files with content reading
        async function processFiles() {
            if (selectedFiles.length === 0) return;

            // Show processing modal
            processingModal.classList.remove('hidden');
            processBtn.disabled = true;
            processText.textContent = 'Processing...';
            processLoader.classList.remove('hidden');

            const processedFiles = [];
            const totalFiles = selectedFiles.length;

            try {
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    processStatus.textContent = `Reading ${file.name}... (${i + 1}/${totalFiles})`;
                    
                    try {
                        const content = await readFileContent(file);
                        
                        const fileData = {
                            name: file.name,
                            size: file.size,
                            type: file.type,
                            content: content,
                            lastModified: file.lastModified,
                            uploadedAt: new Date().toISOString()
                        };
                        
                        processedFiles.push(fileData);
                    } catch (error) {
                        console.error(`Error reading file ${file.name}:`, error);
                        // Still add file without content for tracking
                        processedFiles.push({
                            name: file.name,
                            size: file.size,
                            type: file.type,
                            content: null,
                            error: error.message,
                            lastModified: file.lastModified,
                            uploadedAt: new Date().toISOString()
                        });
                    }
                    
                    // Update progress
                    const progress = ((i + 1) / totalFiles) * 100;
                    progressBar.style.width = `${progress}%`;
                }

                // Store processed files in sessionStorage
                sessionStorage.setItem('uploadedFiles', JSON.stringify(processedFiles));
                
                // Update status
                processStatus.textContent = 'Files processed successfully!';
                await new Promise(resolve => setTimeout(resolve, 1000));
                
                // Navigate to dashboard
                window.location.href = 'dashboard.html';
                
            } catch (error) {
                console.error('Error processing files:', error);
                processStatus.textContent = 'Error processing files';
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // Hide modal and reset button
                processingModal.classList.add('hidden');
                processBtn.disabled = false;
                processText.textContent = 'Process Files';
                processLoader.classList.add('hidden');
            }
        }

        // Get file icon
        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const iconMap = {
                'js': 'file-code',
                'jsx': 'file-code',
                'ts': 'file-code', 
                'tsx': 'file-code',
                'py': 'file-code',
                'html': 'file-text',
                'css': 'file-text',
                'json': 'file-text',
                'md': 'file-text',
                'pdf': 'file-text'
            };
            return iconMap[ext] || 'file';
        }

        // Get file icon color
        function getFileIconColor(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const colorMap = {
                'js': 'text-yellow-600',
                'jsx': 'text-yellow-600',
                'ts': 'text-blue-600',
                'tsx': 'text-blue-600',
                'py': 'text-green-600',
                'html': 'text-red-600',
                'css': 'text-purple-600',
                'json': 'text-gray-600',
                'md': 'text-blue-500',
                'pdf': 'text-red-500'
            };
            return colorMap[ext] || 'text-gray-500';
        }

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // Process functionality
        processBtn.addEventListener('click', processFiles);

        // Initialize Lucide icons on page load
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
        });
    </script>
</body>
</html>
